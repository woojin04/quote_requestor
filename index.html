<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quote Request Form</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="page-shell">
    <section class="request-panel">
      <p class="eyebrow">Internal Use</p>
      <h1>견적 요청 폼</h1>
      <p class="hero-copy">
        요청 내용을 정리해서 보내는 내부용 페이지.
      </p>

      <form class="quote-form" id="quote-form">
        <label>
          요청자 회사
          <input type="text" name="company" placeholder="회사명을 입력하세요" required>
        </label>
        <label>
          물건 브랜드
          <input type="text" name="brand" placeholder="브랜드명을 입력하세요" required>
        </label>
        <label>
          수량
          <input type="number" name="quantity" min="1" placeholder="예: 100" required>
        </label>
        <label>
          품번
          <input type="text" name="sku" placeholder="품번을 입력하세요" required>
        </label>
        <label class="full-width">
          물건 타입
          <input type="text" name="itemType" placeholder="예: 가방, 부품, 패키지" required>
        </label>
        <label class="full-width">
          부가 설명
          <textarea name="details" rows="5" placeholder="추가 요청 사항이나 참고 내용을 적어주세요"></textarea>
        </label>
        <label class="full-width">
          참고 사진
          <input type="file" id="photo-input" name="photos" accept="image/*" multiple>
        </label>
        <p class="file-help full-width" id="file-help">여러 장 선택할 수 있습니다.</p>
        <button class="button button-primary" id="submit-button" type="submit">메일로 보내기</button>
      </form>

      <p class="form-response" id="form-response" aria-live="polite"></p>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
